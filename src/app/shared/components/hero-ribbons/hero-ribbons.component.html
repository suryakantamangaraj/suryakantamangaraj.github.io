        <stop offset="100%" stop-color="#405ca1" stop-opacity="0.8" />

    <!-- Base sine wave: y = 50 + 30*sin(x). Cycle: 100 -->

      d="M 0 50 C 25 80, 25 20, 50 50 C 75 80, 75 20, 100 50 C 125 80, 125 20, 150 50 C 175 80, 175 20, 200 50 L 200 70 C 175 40, 175 100, 150 70 C 125 40, 125 100, 100 70 C 75 40, 75 100, 50 70 C 25 40, 25 100, 0 70 Z"
